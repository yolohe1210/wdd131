<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Habit Garden">
    <meta name="author" content="Yin He">
    <title>Habit Garden</title>
    <link href="style.css" rel="stylesheet">
    <script src="main.js" defer></script>
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Habit Garden">
    <meta property="og:description" content="The website for Habit Garden">
    <meta property="og:url" content="https://yolohe1210.github.io/wdd131/final">
    <meta property="og:image" content="images/logo.png">

    <!-- X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Habit Garden">
    <meta name="twitter:description" content="The website for Habit Garden">
    <meta name="twitter:image" content="images/logo.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="images/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png"> 
</head>
<body>
    <header>
        <div class="title">
            <img src="images/logo.png" alt="Habit Garden Logo">
            <h1>Habit Garden</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="intro.html">Introduction</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="habit-container">
            <section class="habit-card">
                <h2>Wake up</h2>
                <h3>Tracker:</h3>
                <p class="tracker"></p>
                <p class="description">Wake up at 7 am every day.</p>
                <button class="complete" type="button" aria-label="Complete Wake up habit">Complete</button>
            </section>
            <section class="habit-card">
                <h2>Walk</h2>
                <h3>Tracker:</h3>
                <p class="tracker"></p>
                <p class="description">Walk 10,000 steps every day.</p>
                <button class="complete" type="button" aria-label="Complete Walk habit">Complete</button>
            </section>
            <section class="habit-card">
                <h2>Drink water</h2>
                <h3>Tracker:</h3>
                <p class="tracker"></p>
                <p class="description">Drink 8 cups of water every day.</p>
                <button class="complete" type="button" aria-label="Complete Drink water habit">Complete</button>
            </section>
        </div>
    </main>
    <footer><p>2026 - Yin He</p></footer>
</body>
</html>
