<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes</title>
    <link href="style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Walter+Turncoat&display=swap" rel="stylesheet">

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="RECIPEBOOK">
    <meta property="og:description" content="The website for RECIPEBOOK">
    <meta property="og:url" content="https://yolohe1210.github.io/wdd131/recipes">
    <meta property="og:image" content="images/recipe-book.png">

    <!-- X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="RECIPEBOOK">
    <meta name="twitter:description" content="The website for RECIPEBOOK">
    <meta name="twitter:image" content="images/recipe-book.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="images/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">      
</head>
<body>
    <header>
        <img src="images/recipe-book.png" alt="RecipeBook logo">
        <h1>RECIPEBOOK</h1>
    </header>
    <div class="search">
        <input type="text" placeholder="Find a recipe">
        <img src="images/search.svg" alt="Search">
    </div>

    <main>       
        <div class="recipe-card">
            <div class="recipe-img">
            <img src="images/apple-crisp.jpg" alt="Apple crisp dessert">
            </div>
            <div class="recipe-info">
                <p class="type">dessert</p>
                <h2>APPLE CRISP</h2>
                <span
                class="rating"
                role="img"
                aria-label="Rating: 4 out of 5 stars"
                >
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>
                <p class="recipe-description">This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.</p>
            </div>  
        </div>    
    </main>         
    <footer>      
        <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>                  
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons" id="copyright">Recipe icons created by Freepik - Flaticon</a>           
    </footer>       
</body>
</html>
